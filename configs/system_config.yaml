# Ethics-by-Design Framework - System Configuration
# Core system architecture and component configuration

# Framework Architecture Configuration
architecture:
  layers:
    count: 5
    processing_order: ["ethical_ai_services", "privacy_preserving", "explainability_transparency", "bias_detection_mitigation", "adaptive_governance"]
    parallel_processing: false
    error_handling: "graceful_degradation"
    
  # Layer-specific configurations
  layer_configs:
    ethical_ai_services:
      cache_capacity: 10000
      cache_strategy: "lru"
      algorithm_registry_size: 100
      constraint_composition: true
      
    privacy_preserving:
      default_epsilon: 1.0
      default_delta: 1e-5
      privacy_budget_tracking: true
      consent_validation: true
      
    explainability_transparency:
      stakeholder_types: ["user", "developer", "auditor"]
      explanation_quality_threshold: 0.7
      cultural_adaptation: false
      
    bias_detection_mitigation:
      detection_methods: ["demographic", "behavioral", "content"]
      bias_threshold: 0.1
      mitigation_strategies: ["reweighting", "resampling", "adversarial"]
      history_window_size: 1000
      
    adaptive_governance:
      policy_engine_enabled: true
      compliance_monitoring: true
      audit_logging: true
      adaptive_learning: true

# Algorithm Registry Configuration
algorithm_registry:
  supported_types:
    - "collaborative_filtering"
    - "hiring_recommendation"
    - "social_media_ranking"
    - "content_classification"
    - "custom"
  
  performance_tracking:
    enabled: true
    metrics: ["latency", "throughput", "error_rate", "cache_hit_rate"]
    retention_period_days: 30
    
  caching:
    enabled: true
    strategy: "lru"
    capacity: 10000
    ttl_seconds: 3600

# Constraint System Configuration
constraint_system:
  supported_constraints:
    fairness:
      type: "demographic_parity"
      default_threshold: 0.8
      protected_attributes: ["demographic_group", "age_group", "gender"]
      
    privacy:
      type: "differential_privacy"
      default_epsilon: 1.0
      default_delta: 1e-5
      sensitivity: 1.0
      
    wellbeing:
      type: "engagement_limits"
      max_engagement_minutes: 120
      min_break_minutes: 15
      daily_limit_minutes: 180
      
    transparency:
      type: "explainability"
      min_coverage: 0.7
      required_stakeholders: ["user", "developer"]
      
    consent:
      type: "user_consent"
      expiry_days: 365
      required_types: ["data_processing", "algorithmic_decision"]
  
  composition:
    conflict_detection: true
    resolution_strategy: "priority_based"
    max_constraints_per_decision: 10
    parallel_validation: true

# Data Generation Configuration
data_generation:
  scenarios:
    social_media:
      user_id_range: [1, 100000]
      content_id_range: [1, 1000000]
      engagement_distribution: "pareto"
      temporal_patterns: true
      
    hiring:
      candidate_id_range: [1, 50000]
      job_id_range: [1, 10000]
      experience_distribution: "gamma"
      bias_simulation: true
      
    content_recommendation:
      user_id_range: [1, 200000]
      item_id_range: [1, 500000]
      relevance_distribution: "normal"
      popularity_bias: true
  
  generation_modes:
    realistic:
      bias_level: 0.1
      noise_level: 0.05
      temporal_correlation: 0.3
      
    biased:
      bias_level: 0.4
      noise_level: 0.1
      temporal_correlation: 0.6
      
    stress_test:
      bias_level: 0.8
      noise_level: 0.2
      temporal_correlation: 0.9

# Performance Configuration
performance:
  optimization:
    parallel_processing: true
    max_workers: 4
    batch_processing: true
    batch_size: 100
    
  caching:
    decision_cache_size: 10000
    result_cache_size: 5000
    cache_ttl_seconds: 3600
    
  monitoring:
    metrics_collection: true
    performance_profiling: true
    memory_monitoring: true
    
  targets:
    max_latency_p95_ms: 1.0
    min_throughput_rps: 180000
    max_memory_usage_mb: 500
    max_cpu_usage_percent: 80

# Security Configuration
security:
  data_protection:
    encryption_at_rest: false
    encryption_in_transit: false
    pii_detection: true
    anonymization: true
    
  access_control:
    authentication_required: false
    authorization_levels: ["read", "write", "admin"]
    audit_logging: true
    
  privacy:
    differential_privacy_enabled: true
    consent_management: true
    data_retention_days: 90
    right_to_deletion: true

# Integration Configuration
integration:
  external_systems:
    ml_frameworks: ["scikit-learn", "tensorflow", "pytorch"]
    databases: ["postgresql", "mongodb", "redis"]
    message_queues: ["rabbitmq", "kafka"]
    
  apis:
    rest_api_enabled: false
    graphql_enabled: false
    grpc_enabled: false
    
  monitoring:
    prometheus_enabled: false
    grafana_enabled: false
    elk_stack_enabled: false

# Development Configuration
development:
  debug_mode: false
  verbose_logging: false
  profiling_enabled: false
  
  testing:
    unit_tests_enabled: true
    integration_tests_enabled: true
    performance_tests_enabled: true
    
  code_quality:
    linting_enabled: true
    type_checking_enabled: true
    code_coverage_threshold: 0.8

# Deployment Configuration
deployment:
  environment: "development"  # development, staging, production
  scaling:
    horizontal_scaling: false
    vertical_scaling: true
    auto_scaling: false
    
  reliability:
    health_checks: true
    circuit_breaker: false
    retry_policy: "exponential_backoff"
    
  observability:
    logging_level: "INFO"
    metrics_export: false
    tracing_enabled: false 